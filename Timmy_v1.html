const questions = [
{ text: "1. (4) 為預防泌尿道感染的措施，下列做法何者正確？ ①建議案主盆浴 ②建議每5～6小時解尿一次 ③維持尿液的鹼性，以增加抑菌能力 ④在無特殊疾病的飲水禁忌情況下，一般案主每天飲水量至少2000cc。", ans: "4" },
{ text: "2. (3) 修剪指甲的原則，何者為不正確？ ①手指甲剪成圓形 ②腳趾甲剪成平形 ③足部剪繭使用剪刀剪 ④指甲每兩週修剪一次。", ans: "3" },
{ text: "3. (2) 造成案主便秘的原因，下列何者不正確？ ①身體活動量減少 ②定時給予腹部按摩 ③飲食中缺乏纖維素 ④麻醉、機械性的阻塞。", ans: "2" },
{ text: "4. (3) 腹瀉的護理措施，下列何者不正確？ ①增加水分攝取量 ②預防肛門周圍皮膚破損 ③增加含纖維質食物之攝取 ④必要時需禁食。", ans: "3" },
{ text: "5. (2) 下列哪些被照顧者需執行床上沐浴？ A. 中風癱瘓者 B. 意識不清者 C. 早期的失智症患者 D. 憂鬱症而無法自行沐浴者 ①ABC ②ABD ③BCD ④ACD。", ans: "2" },
{ text: "6. (1) 照顧一位左手乏力的人，其褲帶最好是選擇何者？ ①繫緊帶 ②綁帶子 ③拉鍊 ④鈕扣。", ans: "1" },
{ text: "7. (2) 案主平躺時，髖關節極易向外翻，所以應給予案主使用： ①床板 ②毛毯、浴毯捲軸 ③垂足板 ④手握捲。", ans: "2" },
{ text: "8. (3) 下列有關鋪床的姿勢，何者為正確？ ①應盡量彎腰 ②兩腳盡量伸直 ③脊柱保持平直 ④重心放於背部。", ans: "3" },
{ text: "9. (2) 會陰沖洗時，沖洗壺的壺嘴正確方向為 ①朝向床頭 ②朝向床尾 ③朝向左邊 ④朝向右邊。", ans: "2" },
{ text: "10. (3) 幫案主執行會陰沖洗時，棉棒擦洗方式應 ①由左側擦至右側 ②由右側擦至左側 ③由上往下擦至會陰 ④由會陰往上擦至恥骨聯合處。", ans: "3" },
{ text: "11. (3) 以鼻胃管灌食時，食物的溶液距胃的高度依食物濃稠度約 ①5公分以下 ②6～10公分 ③35～45公分 ④50公分以上。", ans: "3" },
{ text: "12. (3) 長期臥床者皮膚照顧最需注意的問題是 ①手足廢用 ②關節畸形 ③壓瘡 ④便秘。", ans: "3" },
{ text: "13. (2) 鋪床時照顧服務員應將身體的重心放於 ①雙手上 ②雙腳上 ③雙肩上 ④臀部上。", ans: "2" },
{ text: "14. (3) 長時間不動對案主造成的問題不包括哪一項？ ①姿勢性低血壓 ②排尿困難 ③腹瀉 ④骨質疏鬆。", ans: "3" },
{ text: "15. (4) 女性案主會陰沖洗的正確姿勢為 ①平躺仰臥 ②左側臥 ③右側臥 ④屈膝仰臥。", ans: "4" },
{ text: "16. (1) 若被照顧者有一側肢體行動不便，穿脫衣服的順序何者較適宜？ ①先脫健側 ②先脫患側 ③先穿健側 ④由被照顧者自己決定。", ans: "1" },
{ text: "17. (1) 協助案主穿脫衣服順序何者為宜？ ①先穿遠側 ②先穿近側 ③先脫遠側 ④依案主喜好而定。", ans: "1" },
{ text: "18. (1) 有關執行個人衛生照護的目的，下列何者不正確？①打發時間②促進血液循環③保持感覺清爽舒適④強化外觀與自尊。", ans: "1" },
{ text: "19. (4) 尿失禁的敘述，何者不正確？①非意識的控制下解出尿液②照護宜保持清潔與舒適的原則③給予排尿訓練或使用尿套、尿布等襯墊④每天訓斥病患要好好自我控制小便。", ans: "4" },
{ text: "20. (1) 身體容易發生壓瘡的部位是①尾椎骨處②腹部③胸部④大腿。", ans: "1" },
{ text: "21. (2) 促進正常排便的方法，下列何者不正確？①養成定時排便的習慣②攝取富含高蛋白質的食物③安排適當的排便姿勢④每日攝取2000～3000西西的液體。", ans: "2" },
{ text: "22. (4) 一般協助案主維持個人衛生的原則，下列敘述何者不正確？①注重個人隱私環境②維持室內溫度22°C~27°C③於飯前或飯後1小時才做④需用力擦拭才能將身上的污垢去除。", ans: "4" },
{ text: "23. (3) 用來協助案主支托身體的用物，下列何者不正確？①枕頭②毛巾③臂盆④床單。", ans: "3" },
{ text: "24. (4) 灌食的注意事項，下列何者不正確？①應避免灌入空氣②灌食中若出現咳嗽不止，應立刻停止灌食③需抬高床頭再灌食，並確定胃管是否於胃內④灌食後立即採平躺臥姿。", ans: "4" },
{ text: "25. (4) 促進傷口癒合的措施，下列何者不正確？①傷口保持清潔②勤於翻身，減少傷口受壓力的時間③注意營養補充④不可下床活動，儘量臥床休息。", ans: "4" },
{ text: "26. (2) 照顧服務員為案主洗頭時，搓揉頭髮及頭皮的適當方式①使用指甲尖端②使用指腹③使用美容院常用的塑膠髮梳④使用按摩棒。", ans: "2" },
{ text: "27. (2) 正常成人的心跳次數為每分鐘①40~59次②60~99次③100~109次④110次及以上。", ans: "2" },
{ text: "28. (1) 成人每分鐘正常呼吸次數，下列何者正確？①12~20次/分②25~29次/分③30~35次/分④36~40次/分。", ans: "1" },
{ text: "29. (2) 下列情況，何者不適合用熱敷來減輕不適？①月經痛②耳朵痛③膝關節痛④手臂酸痛。", ans: "2" },
{ text: "30. (3) 當一個人發燒時會出現那些症狀？A.口渴 B.臉色潮紅 C.脈搏加速 D.食慾不振 E.呼吸慢而淺 F.小便量增加 G.皮膚乾燥而發燙 ①ACDEF ②CDEFG ③ABCDG ④BDEFG。", ans: "3" },
{ text: "31. (3) 為案主做身體清潔時，水溫要比體溫①低5度②一樣③略高④低10度。", ans: "3" },
{ text: "32. (4) 有關預防壓瘡的方法，下列何者不正確？①均衡營養②保持皮膚乾爽③使用適當輔助用品④每四小時翻身一次。", ans: "4" },
{ text: "33. (4) 對於老年人皮膚之描述，下列何者不正確？①易受細菌感染②皮脂腺萎縮造成皮膚乾燥③將皮膚塗擦乳霜或凡士林④皮膚易有色素沈著現象，稱為紫斑。", ans: "4" },
{ text: "34. (2) 下列那一個部位最常被用來測量脈搏？①心尖脈②橈動脈③頸動脈④足背動脈。", ans: "2" },
{ text: "35. (3) 有關呼吸治療的敘述，下列何者不正確？①拍痰一天可2～3次②蒸氣治療的目的是讓痰液稀釋③治療時有頭暈，心跳加快、氣喘是正常現象④姿位引流將痰液最多區擺在最高位，並做區域拍鬆。", ans: "3" },
{ text: "36. (4) 冰袋使用的目的，下列何者不正確？①止血②消腫③減輕疼痛④促進血液循環。", ans: "4" },
{ text: "37. (3) 踝關節扭傷的第一天，可做的處理方式有：A.按摩患肢 B.固定患肢 C.抬高患肢 D.放低患肢 E.冷敷扭傷部位 F.熱敷扭傷部位 ①ACE ②ACF ③BCE ④BDE。", ans: "3" },
{ text: "38. (4) 依據您的判斷下列哪種情況應立即報告？①耳溫36.5℃②嬰兒脈搏120次/分③成人脈搏90次/分④成人脈搏40次/分。", ans: "4" },
{ text: "39. (2) 有關測量血壓時應注意事項，下列何者不正確？①小枕頭支托，與心臟成水平②壓脈帶綁於上臂，愈緊愈準確③將聽診器腹面置於動脈搏動處④反覆再測量時，二次之間應間隔3分鐘以上。", ans: "2" },
{ text: "40. (1) 下列何者是影響體溫下降的因素？①因需檢查而禁食②強烈情緒反應③新陳代謝增加④肌肉活動增加。", ans: "1" },
{ text: "41. (3) 下列何者不是長期臥床被照顧者常見的合併症？①壓瘡②肺炎③昏迷④尿路感染。", ans: "3" },
{ text: "42. (2) 欲觀察突發性昏迷案主的脈搏應該要測量的部位為下列何者？①橈動脈②頸動脈③肱動脈④股動脈。", ans: "2" },
{ text: "43. (1) 皮膚的功能，下列何者不正確？①分泌黏液②排汗、散熱③合成維生素④感受溫度的感覺器官。", ans: "1" },
{ text: "44. (2) 下列何者是造成壓瘡的原因？①均衡營養②固定不動③多變換姿勢④保持皮膚乾爽。", ans: "2" },
{ text: "45. (2) 若關節剛不慎扭傷，導致疼痛、腫脹厲害，初步處理方法為？①熱敷②冰敷③先熱敷再冰敷④先冰敷再熱敷。", ans: "2" },
{ text: "46. (3) 給案主氧氣時的注意事項，下列何者不正確？①濕化氧氣②懸掛禁止吸煙告示牌③看病人喘就給他氧氣④不可突然停止氧氣的供應。", ans: "3" },
{ text: "47. (1) 皮膚長期受壓迫而外觀發紅，為壓傷分類的第幾級？①第一級②第二級③第三級④第四級。", ans: "1" },
{ text: "48. (3) 下列何者為促進有效呼吸的措施？①避免飲水②多與家屬交談③深呼吸及有效的咳嗽④儘可能讓案主平躺，不要下床。", ans: "3" },
{ text: "49. (3) 下列何種情形會促使壓瘡產生？①提供適當的營養②儘可能將案主抬起再移動，以免摩擦皮膚③鼓勵案主坐起，能坐多久就坐多久④經常幫助臥床案主翻身，減少身體組織持續受壓。", ans: "3" },
{ text: "50. (2) 有關氧氣治療的注意事項，下列何者不正確？①需注意被照顧者的呼吸型態②被照顧者可自行調整氧氣濃度③給氧需依醫囑由護理人員執行④持續用氧的被照顧者不可突然停用。", ans: "2" },
{ text: "51. (3) 案主發燒時的照顧措施，下列何者不正確？①增加水分攝取②降低室溫減少衣服被蓋③用熱水擦澡以免著涼④補充高營養易消化流質飲食。", ans: "3" },
{ text: "52. (2) 當案主有服用毛地黃藥物時，應特別注意下列何種生命徵象？①體溫②心跳③血壓④呼吸速率。", ans: "2" },
{ text: "53. (4) 為臥床案主作關節活動時，順序應為①先做健側②無特殊順序③由遠心端關節做起④由近心端關節做起。", ans: "4" },
{ text: "54. (1) 有關臥床案主預防壓瘡的方法，下列何者錯誤？①壓瘡傷口多按摩②每2小時協助翻身③身體移位時應避免摩擦④以軟墊保護身體的骨突處。", ans: "1" },
{ text: "55. (4) 案主長期臥床固定不動時，形成的合併症有哪些？A.重足 B.憂鬱 C.栓塞 D.骨質疏鬆 E.髖關節外旋、屈曲 F.身體水腫 G.血壓上升 ①ABDFG ②BCDEG ③ACDEF ④ABCDE。", ans: "4" },
{ text: "56. (3) 關於糖尿病被照顧者的足部護理，下列描述何者不正確？①不可赤足走路②每日清潔襪子③有穿鞋就好不必合腳④每日檢視雙足。", ans: "3" },
{ text: "57. (3) 生命徵象的範圍包括那些？①血壓、意識狀態②脈搏、疼痛反應③血壓、體溫、呼吸、脈搏④神經反射、意識狀態。", ans: "3" },
{ text: "58. (3) 測量口溫時，口溫表放置的位置宜在①舌上②用舌含住即可③舌下舌繫帶旁④請案主用牙齒咬住。", ans: "3" },
{ text: "59. (1) 高血壓患者飲食需注意事項，下列何者正確？①採用低油、低鹽的飲食②多喝牛奶、吃小魚乾③多吃動物性蛋白質的食物④植物性奶油因為是植物性的，多吃沒關係。", ans: "1" },
{ text: "60. (4) 有關按摩的注意事項，下列何者不正確？①服務員應保持雙手溫暖②可配合塗抹冷霜或滑石粉③動作應溫和而有頻率，並且注意案主的反應④於案主吃飽飯後馬上進行按摩可幫助消化。", ans: "4" },
{ text: "61. (3) 照顧服務員用兩手握住案主的手腕，旋轉案主手掌，轉向臉部，然後轉向足部，是屬於何種運動？①肩部運動②大拇指運動③手腕迴轉運動④手腕前後彎曲運動。", ans: "3" },
{ text: "62. (2) 下列哪個年齡層之體溫較低？①成年②老年③青少年④幼兒。", ans: "2" },

"492. (4) 照顧服務員的主要業務，下列那一項錯誤？①協助維護案主個人衛生②協助滿足案主個人的基本需要③協助執行專業人員對案主的照護評估與照護計畫④執行注射工作。",
"493. (1) 為了讓案主賞心悅目，照顧服務員穿著何者是不適當的？①配戴鑽戒及項鍊、飾物②衣著樸素、整潔，不過度暴露③頭髮梳理整齊，不披頭散髮④宜穿軟底鞋，不穿高跟鞋。",
"494. (4) 為案主調配膳食時，應遵守的法則，下列哪一項是錯誤的？①手指、皮膚有傷口、膿瘡者需戴手套②調配膳食前後均應確實洗手③配膳前應將飾物、戒指、手錶等脫除④好不容易才留長的指甲，剪掉可惜，不必修剪。",
"495. (1) 照顧服務員挪用案主之金錢，可能涉嫌觸犯哪一項罪名？①業務侵占罪②竊盜罪③詐欺罪④贓物罪。",
"496. (4) 照顧老弱是何人的責任？①家人的責任②國家應負完全的责任③慈善機構的责任④國家、社會、家庭共同要負擔的責任。",
"497. (1) 照顧服務員協助單身案主申請身心障礙證明，應向那一個單位提出？①戶籍所在地之鄉、鎮、市、區公所②衛福部③縣市政府社會局④地區以上之醫院。",
"498. (1) 長期照顧機構內的牆壁或地面，需有何設施，以方便身障者行動？①簡明和標準的標示或符號②美麗的垂飾③名畫、花地磚④一般的鏡子。",
"499. (2) 對於長照服務機構下列那一項敘述是合宜的？①安養機構可以收容重症或植物人②夜間應裝置夜燈及緊急照明設備③不必有逃生設備，但需有足夠的人力將住民移到安全地方④建築物整年都用中央空調，無通風不良之虞。",
"500. (4) 照顧服務員留存照顧記錄的意義，下列敘述何者不正確？①提供醫生、護理人員及其他醫療團隊的人員處置時參考的訊息②提供給被照顧者及其家人參考③若發生醫療糾紛、保險理賠、犯罪嫌疑、甚或遺囑查證，記錄也是一種法律上的證明文件④毫無意義或用途。"
];

for(let q of extra151_500) {
    let match = q.match(/^(\d+)\.\s*\((\d)\)\s*(.*)/);
    if(match) questions.push({ text: q, ans: match[2] });
}

// 排序確保題號順序
questions.sort((a,b) => parseInt(a.text.split('.')[0]) - parseInt(b.text.split('.')[0]));

// 移除題幹中的答案標記（例如 "1. (4) " → "1. "）
function cleanQuestionText(raw) {
    return raw.replace(/^\d+\.\s*\(\d\)\s*/, (match) => {
        // 取出題號部分保留
        const numMatch = match.match(/^(\d+)\./);
        if(numMatch) return numMatch[1] + ". ";
        return "";
    });
}

// 渲染
const container = document.getElementById('questionsContainer');
function render() {
    container.innerHTML = '';
    questions.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        const numSpan = document.createElement('span');
        numSpan.className = 'q-num';
        numSpan.innerText = `${idx+1}`;
        const qTextSpan = document.createElement('span');
        qTextSpan.className = 'question-text';
        // 顯示清除答案標記後的題幹
        qTextSpan.innerHTML = cleanQuestionText(item.text);
        qDiv.appendChild(numSpan);
        qDiv.appendChild(qTextSpan);
        const ansDiv = document.createElement('div');
        ansDiv.className = 'answer';
        ansDiv.innerHTML = `<span class="answer-badge">✅ 正確答案： ${item.ans}</span>`;
        qDiv.addEventListener('click', () => ansDiv.classList.toggle('show'));
        card.appendChild(qDiv);
        card.appendChild(ansDiv);
        container.appendChild(card);
    });
}
render();
document.getElementById('goTopBtn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
</script>
